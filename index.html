<script>
// ===== SUPABASE SETUP =====
const SUPABASE_URL = 'https://oeobhzpkdmfnibhvonsq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KCp4-j45I98OOvS3bqVmJA_4fvSWqZA';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Save score to Supabase
async function saveScore(name, score, total) {
  try {
    const { error } = await supabaseClient
      .from('quiz_results')
      .insert([{
        name: name,
        score: score,
        total: total,
        percentage: Math.round((score / total) * 100)
      }]);
    if (error) throw error;
    console.log('Score saved!');
  } catch (err) {
    console.error('Could not save score:', err);
  }
}

// Student name (set on name screen)
let studentName = '';

// Show name entry screen first
function showNameScreen() {
  document.querySelector('main').innerHTML = `
    <div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-6 py-12">
      <div style="font-size:70px; margin-bottom:16px;">🌍</div>
      <h1 class="font-headline font-extrabold text-5xl text-on-surface mb-4">
        Welcome Explorer!
      </h1>
      <p class="text-on-surface-variant text-xl mb-10">
        Enter your name to start the quiz!
      </p>
      <div class="w-full max-w-md">
        <input id="student-name"
          type="text"
          placeholder="Your name here..."
          maxlength="30"
          style="width:100%; padding:16px 24px;
                 border:2px solid #a2abd7;
                 border-radius:50px; font-size:18px;
                 outline:none; text-align:center;
                 font-family:'Plus Jakarta Sans';
                 margin-bottom:16px;"
          onfocus="this.style.border='2px solid #0058ba'"
          onblur="this.style.border='2px solid #a2abd7'"
          onkeypress="if(event.key==='Enter') startQuiz()">
        <br/>
        <button onclick="startQuiz()"
          class="bg-gradient-to-br from-primary to-primary-container text-on-primary px-16 py-5 rounded-full font-headline font-black text-xl shadow-lg shadow-primary/30 hover:scale-105 active:scale-95 transition-all mt-4">
          Let's Go! 🚀
        </button>
      </div>
    </div>
  `;
}

function startQuiz() {
  const nameInput = document.getElementById('student-name');
  if (!nameInput.value.trim()) {
    nameInput.style.border = '2px solid #b31b25';
    nameInput.placeholder = 'Please enter your name!';
    return;
  }
  studentName = nameInput.value.trim();
  // Rebuild main content and load quiz
  document.querySelector('main').innerHTML = mainContent;
  loadQuestion();
}

// Store main content HTML to restore after name screen
let mainContent = '';

const questions = [
  {

    imageAlt: "Brazilian Flag",
    options: ["Brazil", "Argentina", "Chile", "Peru"],

let currentQuestion = 0;
let score = 0;
let answered = false;

function loadQuestion() {
  const q = questions[currentQuestion];
  answered = false;

  // Update progress
  const progress = ((currentQuestion) / questions.length) * 100;
  document.querySelectorAll('.progress-bar').forEach(b => b.style.width = progress + '%');
  document.querySelectorAll('.progress-text').forEach(t => t.textContent = (currentQuestion + 1) + ' of ' + questions.length);

  // Update question
  document.getElementById('question-text').textContent = q.question;
  document.getElementById('flag-image').src = q.image;
  document.getElementById('flag-image').alt = q.imageAlt;
  document.getElementById('badge-name').textContent = q.badge;
  document.getElementById('feedback-box').classList.add('hidden');

  // Update options
  const optionLetters = ['A', 'B', 'C', 'D'];
  const optionBtns = document.querySelectorAll('.option-btn');
  optionBtns.forEach((btn, i) => {
    btn.className = "option-btn group relative flex items-center justify-between p-6 bg-surface-container-lowest text-on-surface rounded-full shadow-md hover:shadow-xl hover:bg-surface-container-low transform active:scale-95 transition-all duration-300 w-full text-left";
    btn.innerHTML = `
      <div class="flex items-center gap-5">
        <span class="w-12 h-12 flex items-center justify-center bg-surface-container-high rounded-full font-headline font-black text-xl text-primary">${optionLetters[i]}</span>
        <span class="font-headline font-bold text-2xl tracking-tight">${q.options[i]}</span>
      </div>
      <span class="material-symbols-outlined text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity">radio_button_unchecked</span>
    `;
    btn.onclick = () => selectAnswer(i);
  });

  // Update submit button
  document.getElementById('submit-btn').textContent = 'SUBMIT ANSWER';
  document.getElementById('submit-btn').onclick = submitAnswer;
}

function selectAnswer(index) {
  if (answered) return;
  const optionBtns = document.querySelectorAll('.option-btn');
  const optionLetters = ['A', 'B', 'C', 'D'];
  const q = questions[currentQuestion];

  // Deselect all
  optionBtns.forEach((btn, i) => {
    btn.className = "option-btn group relative flex items-center justify-between p-6 bg-surface-container-lowest text-on-surface rounded-full shadow-md hover:shadow-xl hover:bg-surface-container-low transform active:scale-95 transition-all duration-300 w-full text-left";
    btn.innerHTML = `
      <div class="flex items-center gap-5">
        <span class="w-12 h-12 flex items-center justify-center bg-surface-container-high rounded-full font-headline font-black text-xl text-primary">${optionLetters[i]}</span>
        <span class="font-headline font-bold text-2xl tracking-tight">${q.options[i]}</span>
      </div>
      <span class="material-symbols-outlined text-on-surface-variant opacity-0 group-hover:opacity-100 transition-opacity">radio_button_unchecked</span>
    `;
    btn.onclick = () => selectAnswer(i);
  });

  // Select clicked
  optionBtns[index].className = "option-btn group relative flex items-center justify-between p-6 bg-primary text-on-primary rounded-full shadow-xl shadow-primary/30 transform active:scale-95 transition-all duration-300 w-full text-left pop";
  optionBtns[index].innerHTML = `
    <div class="flex items-center gap-5">
      <span class="w-12 h-12 flex items-center justify-center bg-white/20 rounded-full font-headline font-black text-xl">${optionLetters[index]}</span>
      <span class="font-headline font-bold text-2xl tracking-tight">${q.options[index]}</span>
    </div>
    <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
  `;
  optionBtns[index].dataset.selected = index;
}

function submitAnswer() {
  if (answered) return;

  const optionBtns = document.querySelectorAll('.option-btn');
  const q = questions[currentQuestion];
  const optionLetters = ['A', 'B', 'C', 'D'];

  // Find selected
  let selected = -1;
  optionBtns.forEach((btn, i) => {
    if (btn.dataset.selected !== undefined) selected = parseInt(btn.dataset.selected);
  });

  if (selected === -1) {
    alert('Please select an answer first! 🌍');
    return;
  }

  answered = true;

  // Show correct / wrong
  optionBtns.forEach((btn, i) => {
    btn.classList.add('option-disabled');
    btn.removeAttribute('data-selected');
    if (i === q.correct) {
      btn.className = "option-btn option-correct option-disabled group relative flex items-center justify-between p-6 rounded-full shadow-xl w-full text-left";
      btn.innerHTML = `
        <div class="flex items-center gap-5">
          <span class="w-12 h-12 flex items-center justify-center bg-white/20 rounded-full font-headline font-black text-xl">${optionLetters[i]}</span>
          <span class="font-headline font-bold text-2xl tracking-tight">${q.options[i]}</span>
        </div>
        <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
      `;
    } else if (i === selected && selected !== q.correct) {
      btn.className = "option-btn option-wrong option-disabled group relative flex items-center justify-between p-6 rounded-full shadow-xl w-full text-left shake";
      btn.innerHTML = `
        <div class="flex items-center gap-5">
          <span class="w-12 h-12 flex items-center justify-center bg-white/20 rounded-full font-headline font-black text-xl">${optionLetters[i]}</span>
          <span class="font-headline font-bold text-2xl tracking-tight">${q.options[i]}</span>
        </div>
        <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">cancel</span>
      `;
    }
  });

  // Update score
  if (selected === q.correct) {
    score++;
    document.getElementById('feedback-box').className = "w-full p-6 rounded-2xl bg-secondary-container text-on-secondary-container mb-4";
    document.getElementById('feedback-icon').textContent = '🎉';
    document.getElementById('feedback-title').textContent = 'Correct! Well done Explorer!';
    document.getElementById('feedback-fact').textContent = q.fact;
  } else {
    document.getElementById('feedback-box').className = "w-full p-6 rounded-2xl bg-error-container text-on-error-container mb-4";
    document.getElementById('feedback-icon').textContent = '❌';
    document.getElementById('feedback-title').textContent = 'Not quite! The correct answer was ' + q.options[q.correct];
    document.getElementById('feedback-fact').textContent = q.fact;
  }
  document.getElementById('feedback-box').classList.remove('hidden');

  // Change button to Next
  const isLast = currentQuestion === questions.length - 1;
  document.getElementById('submit-btn').textContent = isLast ? 'SEE RESULTS 🏆' : 'NEXT QUESTION →';
  document.getElementById('submit-btn').onclick = isLast ? showResults : nextQuestion;
}

function nextQuestion() {
  currentQuestion++;
  loadQuestion();
  window.scrollTo(0, 0);
}

function showResults() {
  const percentage = Math.round((score / questions.length) * 100);

  // Save to Supabase!
  saveScore(studentName, score, questions.length);

  // Confetti for good scores!
  if (score >= 3) {
    confetti({ particleCount: 200, spread: 100, origin: { y: 0.4 } });
    setTimeout(() => confetti({ particleCount: 100, angle: 60, spread: 80, origin: { x: 0 } }), 400);
    setTimeout(() => confetti({ particleCount: 100, angle: 120, spread: 80, origin: { x: 1 } }), 600);
  }

  let emoji = score === questions.length ? '🏆' : score >= 3 ? '🌟' : score >= 2 ? '😊' : '💪';
  let message = score === questions.length ? 'Perfect Score! You are a Geography Master!' :
                score >= 3 ? 'Great job Explorer! Almost there!' :
                score >= 2 ? 'Good effort! Keep exploring!' : 'Keep practising Explorer!';

  document.querySelector('main').innerHTML = `
    <div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-6 py-12">
      <div style="font-size:80px; margin-bottom:16px;">${emoji}</div>
      <h1 class="font-headline font-extrabold text-5xl text-on-surface mb-2">
        Well done, ${studentName}!
      </h1>
      <p class="text-on-surface-variant text-xl mb-10">${message}</p>
      <div class="bg-surface-container-lowest rounded-2xl shadow-xl p-10 w-full max-w-md mb-10">
        <div class="text-8xl font-headline font-extrabold text-primary mb-2">
          ${score}<span class="text-4xl text-on-surface-variant">/${questions.length}</span>
        </div>
        <div class="text-2xl font-bold text-on-surface-variant mb-6">${percentage}% Correct</div>
        <div class="w-full h-4 bg-surface-container-high rounded-full overflow-hidden mb-6">
          <div class="h-full bg-gradient-to-r from-primary to-primary-container rounded-full transition-all duration-1000"
               style="width: ${percentage}%"></div>
        </div>
        <div style="font-size:36px; letter-spacing:8px;">
          ${score >= 1 ? '⭐' : '☆'}${score >= 3 ? '⭐' : '☆'}${score >= 5 ? '⭐' : '☆'}
        </div>
        <p style="color:#666; font-size:13px; margin-top:12px;">✅ Your score has been saved!</p>
      </div>
      <div class="flex flex-col sm:flex-row gap-4 w-full max-w-md">
        <button onclick="restartQuiz()"
          class="flex-1 bg-gradient-to-br from-primary to-primary-container text-on-primary px-8 py-5 rounded-full font-headline font-black text-xl shadow-lg shadow-primary/30 hover:scale-105 active:scale-95 transition-all">
          🔄 Try Again
        </button>
        <a href="index.html" class="flex-1">
          <button class="w-full bg-surface-container-highest text-primary px-8 py-5 rounded-full font-headline font-bold text-xl hover:scale-105 active:scale-95 transition-all">
            🏠 Home
          </button>
        </a>
      </div>
    </div>
  `;
}

function restartQuiz() {
  currentQuestion = 0;
  score = 0;
  answered = false;
  location.reload();
}

// Start with name screen
window.onload = function() {
  mainContent = document.querySelector('main').innerHTML;
  showNameScreen();
}
</script>
